version: v2

inputs:
  - directory: proto
    types:
      - cerbos.cloud.apikey.v1.ApiKeyService
      - cerbos.cloud.store.v1.CerbosStoreService

plugins:
  - local: node_modules/.bin/protoc-gen-es
    out: packages/hub/src/protobuf
    include_imports: true
    opt:
      - target=ts
      - valid_types=protovalidate_required
