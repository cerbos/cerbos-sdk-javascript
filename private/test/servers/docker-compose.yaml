name: cerbos-sdk-javascript-test

services:
  certificates:
    image: ruby:4.0.5-alpine@sha256:f48938e9ae72a4d32e728b03c306e7a7ff21f0cb6c2ed33f44a078c700b2aea6
    entrypoint: /generate-certificates
    volumes:
      - type: bind
        source: generate-certificates
        target: /generate-certificates
        read_only: true
      - type: bind
        source: tmp/certificates
        target: /certificates

  plaintext:
    image: ghcr.io/cerbos/cerbos:${CERBOS_IMAGE_TAG:-$CERBOS_VERSION}
    environment:
      - CERBOS_CONFIG=/config/plaintext.yaml
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4317
    healthcheck:
      interval: 2s
    ports:
      - protocol: tcp
        target: 3592
        host_ip: "::1"
      - protocol: tcp
        target: 3593
        host_ip: "::1"
    user: ${USER}
    volumes:
      - type: bind
        source: config/cerbos/${CONFIG_VERSION}
        target: /config
        read_only: true
      - type: bind
        source: policies/${POLICIES_VERSION}
        target: /policies
        read_only: true

  socket:
    profiles:
      - linux
    extends: plaintext
    environment:
      - CERBOS_CONFIG=/config/socket.yaml
    volumes:
      - type: bind
        source: tmp/socket
        target: /socket

  tls:
    extends: plaintext
    environment:
      - CERBOS_CONFIG=/config/tls.yaml
    volumes:
      - type: bind
        source: tmp/audit
        target: /audit
      - type: bind
        source: tmp/certificates
        target: /certificates
        read_only: true
    depends_on:
      certificates:
        condition: service_completed_successfully

  mtls:
    image: traefik:v3.7.6@sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
    command:
      - --entrypoints.grpc.address=:3593
      - --ping
      - --providers.file.filename=/config/traefik/mtls.yaml
    healthcheck:
      interval: 2s
      timeout: 1s
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
    ports:
      - protocol: tcp
        target: 3593
        host_ip: "::1"
    volumes:
      - type: bind
        source: tmp/certificates
        target: /certificates
        read_only: true
      - type: bind
        source: config
        target: /config
        read_only: true
    depends_on:
      certificates:
        condition: service_completed_successfully

  mutable:
    extends: plaintext
    environment:
      - CERBOS_CONFIG=/config/mutable.yaml
    volumes:
      - type: bind
        source: tmp/certificates
        target: /certificates
        read_only: true
    depends_on:
      certificates:
        condition: service_completed_successfully

  tracing:
    profiles:
      - tracing
    extends: tls
    environment:
      - CERBOS_CONFIG=/config/tracing.yaml

  jaeger:
    image: jaegertracing/jaeger:2.19.0@sha256:ede4864215be4cd85bd8c3129a2fea6c5713c5653c7282c429dba123014bc68b
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --spider
        - --tries=1
        - http://localhost:13133/status
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s
    ports:
      - protocol: tcp
        target: 16685
        host_ip: "::1"
