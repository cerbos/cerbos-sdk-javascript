name: cerbos-sdk-javascript-test

services:
  certificates:
    image: ruby:4.0.3-alpine@sha256:2c041dcda87517d61ecd3b65832e6433384f8bdfec5b49d07de7f9a84e94f09b
    entrypoint: /generate-certificates
    volumes:
      - type: bind
        source: generate-certificates
        target: /generate-certificates
        read_only: true
      - type: bind
        source: tmp/certificates
        target: /certificates

  plaintext:
    image: ghcr.io/cerbos/cerbos:${CERBOS_IMAGE_TAG:-$CERBOS_VERSION}
    environment:
      - CERBOS_CONFIG=/config/plaintext.yaml
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4317
    healthcheck:
      interval: 2s
    ports:
      - protocol: tcp
        target: 3592
        host_ip: "::1"
      - protocol: tcp
        target: 3593
        host_ip: "::1"
    user: ${USER}
    volumes:
      - type: bind
        source: config/cerbos/${CONFIG_VERSION}
        target: /config
        read_only: true
      - type: bind
        source: policies/${POLICIES_VERSION}
        target: /policies
        read_only: true

  socket:
    profiles:
      - linux
    extends: plaintext
    environment:
      - CERBOS_CONFIG=/config/socket.yaml
    volumes:
      - type: bind
        source: tmp/socket
        target: /socket

  tls:
    extends: plaintext
    environment:
      - CERBOS_CONFIG=/config/tls.yaml
    volumes:
      - type: bind
        source: tmp/audit
        target: /audit
      - type: bind
        source: tmp/certificates
        target: /certificates
        read_only: true
    depends_on:
      certificates:
        condition: service_completed_successfully

  mtls:
    image: traefik:v3.6.15@sha256:8cb20d16e01a53d8d7f7696ac2f1af7d200d5c9984d226ce2299731d9eab6d6c
    command:
      - --entrypoints.grpc.address=:3593
      - --ping
      - --providers.file.filename=/config/traefik/mtls.yaml
    healthcheck:
      interval: 2s
      timeout: 1s
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
    ports:
      - protocol: tcp
        target: 3593
        host_ip: "::1"
    volumes:
      - type: bind
        source: tmp/certificates
        target: /certificates
        read_only: true
      - type: bind
        source: config
        target: /config
        read_only: true
    depends_on:
      certificates:
        condition: service_completed_successfully

  mutable:
    extends: plaintext
    environment:
      - CERBOS_CONFIG=/config/mutable.yaml
    volumes:
      - type: bind
        source: tmp/certificates
        target: /certificates
        read_only: true
    depends_on:
      certificates:
        condition: service_completed_successfully

  tracing:
    profiles:
      - tracing
    extends: tls
    environment:
      - CERBOS_CONFIG=/config/tracing.yaml

  jaeger:
    image: jaegertracing/jaeger:2.17.0@sha256:6266573208d665ce5c17483bce0a75d0806480d92c84766d288d0aee885ce708
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --spider
        - --tries=1
        - http://localhost:13133/status
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s
    ports:
      - protocol: tcp
        target: 16685
        host_ip: "::1"
