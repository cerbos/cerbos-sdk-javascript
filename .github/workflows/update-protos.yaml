name: Update protos

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-protos:
    name: Update protos
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Update protos
        run: pnpm run proto

      - name: Generate code
        run: pnpm run generate

      - name: Create pull request
        uses: cerbos/actions/create-pull-request@a78860e11438c41142d197bd832bfaeae88f3766 # main
        with:
          client-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          branch: update-protos
          title: Update protos
          body: This PR updates protos and regenerates code.
          reviewers: haines
          add-paths: |-
            packages/*/src/protobuf/**/*.ts
            private/*/src/protobuf/**/*.ts
            proto/**/*.proto

      - name: Notify Slack on failure
        if: failure()
        uses: cerbos/actions/notify-slack@a78860e11438c41142d197bd832bfaeae88f3766 # main
        with:
          webhook-url: ${{ secrets.SLACK_CI_NOTIFICATIONS_WEBHOOK_URL }}
